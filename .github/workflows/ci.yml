name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ["ubuntu-latest", "macos-latest"]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install build tooling
        run: python -m pip install --upgrade pip build
      - name: Install package in editable mode
        run: python -m pip install -e .
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Build wheel and sdist
        run: python -m build
      - name: Validate installed wheel
        run: |
          python -m venv .venv-wheel
          . .venv-wheel/bin/activate
          python -m pip install dist/*.whl
          mkdir -p .ci-bin
          cat > .ci-bin/claude <<'EOF'
          #!/usr/bin/env bash
          echo "claude-ci-stub 0.0.0"
          EOF
          cat > .ci-bin/codex <<'EOF'
          #!/usr/bin/env bash
          echo "codex-ci-stub 0.0.0"
          EOF
          chmod +x .ci-bin/claude .ci-bin/codex
          export PATH="$PWD/.ci-bin:$PATH"
          cc-duet --version
          cc-duet install-global --force
          cc-duet doctor --strict .
